<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX_LABS // LUCE_ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --p: #FFD400; /* Primary */
            --on-p: #000000;
            --p-container: rgba(255, 212, 0, 0.12);
            --surface: #080808;
            --outline: rgba(255, 255, 255, 0.08);
            --spring-m3: cubic-bezier(0.2, 0.8, 0.2, 1.1); /* Elastic M3 feel */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }
        body { 
            background-color: #030303; color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; width: 100vw; display: flex; overflow: hidden;
            transition: background 1s ease;
        }

        /* DYNAMIC ATMOSPHERE */
        .ambient-glow {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 60% 120%, var(--p-container) 0%, #030303 70%);
            transition: 1s var(--spring-m3);
        }

        /* M3 EXPRESSIVE RAIL */
        nav.nav-rail { 
            width: 96px; height: 100%; display: flex; flex-direction: column; 
            align-items: center; padding: 32px 0; gap: 24px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(40px);
            border-right: 1px solid var(--outline); z-index: 100;
        }
        .brand-p { font-family: 'Space Grotesk'; font-weight: 700; color: var(--p); font-size: 1.4rem; transition: 0.5s; }
        
        .nav-item {
            width: 64px; height: 64px; border-radius: 20px; 
            background: transparent; border: none; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s var(--spring-m3); position: relative;
        }
        .nav-item .indicator {
            position: absolute; inset: 0; background: var(--p);
            border-radius: 32px; transform: scaleX(0.5) scaleY(0.1); opacity: 0;
            transition: 0.5s var(--spring-m3); z-index: -1;
        }
        .nav-item.active .indicator { transform: scale(1); opacity: 1; border-radius: 20px; }
        .nav-item.active { color: var(--on-p); transform: scale(1.05); }
        .nav-item b { font-size: 1.1rem; }
        .nav-item span { font-size: 0.55rem; font-weight: 900; opacity: 0.3; margin-top: 4px; }
        .nav-item.active span { opacity: 0.7; color: var(--on-p); }

        /* THE BINNACLE (Secure UI) */
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .binnacle {
            width: 100%; height: 90%; max-width: 1400px;
            background: linear-gradient(160deg, #111, #050505);
            border-radius: 56px; border: 1px solid var(--outline);
            display: grid; grid-template-rows: auto 1fr; padding: 60px;
            position: relative; overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 80px var(--p-container);
            transition: box-shadow 1s ease;
        }

        /* INTERNAL INSTRUMENT CLUSTER */
        .dash-top { display: flex; justify-content: space-between; align-items: flex-start; z-index: 20; }
        .status-pill {
            padding: 10px 20px; border-radius: 100px;
            background: var(--p-container); color: var(--p); border: 1px solid var(--p);
            font-size: 0.75rem; font-weight: 900; letter-spacing: 2px;
            display: flex; align-items: center; gap: 10px; transition: 0.5s;
        }
        .gauges { display: flex; gap: 40px; }
        .gauge { text-align: right; }
        .gauge-label { font-size: 0.6rem; font-weight: 900; color: var(--p); letter-spacing: 3px; opacity: 0.5; text-transform: uppercase; }
        .gauge-val { font-family: 'Space Grotesk'; font-size: 2rem; font-weight: 300; display: block; margin-top: 4px; }

        /* HERO LAYOUT */
        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 40px; }
        
        .content { animation: m3FadeIn 0.8s var(--spring-m3); }
        @keyframes m3FadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 6rem; font-weight: 900; line-height: 0.8; letter-spacing: -6px; margin: 24px 0; text-transform: uppercase; }
        .desc { font-size: 1.2rem; opacity: 0.4; line-height: 1.5; max-width: 460px; font-weight: 300; }

        /* BUTTONS */
        .actions { display: flex; gap: 20px; margin-top: 56px; }
        .btn {
            height: 72px; flex: 1; border-radius: 24px; font-weight: 900; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            border: 1px solid var(--outline); background: rgba(255,255,255,0.03); color: #fff;
            transition: 0.4s var(--spring-m3); position: relative; overflow: hidden;
        }
        .btn.primary { background: var(--p); color: var(--on-p); border: none; }
        .btn:hover { transform: scale(1.03) translateY(-4px); border-color: var(--p); background: rgba(255,255,255,0.08); }
        .btn.primary:hover { box-shadow: 0 20px 40px var(--p-container); background: var(--p); opacity: 0.9; }
        
        /* VIEWER */
        .viewer-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        model-viewer { width: 110%; height: 110%; --poster-color: transparent; }

        /* FOOTER */
        .footer { 
            position: fixed; bottom: 32px; left: 130px; 
            font-size: 0.7rem; font-weight: 900; letter-spacing: 4px; 
            opacity: 0.3; text-transform: uppercase; 
        }
        .footer b { color: var(--p); margin-right: 12px; }

        /* SETTINGS FAB */
        #fab {
            position: fixed; bottom: 32px; right: 40px;
            width: 80px; height: 80px; border-radius: 28px;
            background: #111; color: var(--p); border: 1px solid var(--outline);
            display: grid; place-items: center; transition: 0.5s var(--spring-m3);
        }
        #fab:hover { border-radius: 40px; background: var(--p); color: var(--on-p); transform: scale(1.15) rotate(90deg); }

    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <nav class="nav-rail" id="rail">
        <div class="brand-p">P</div>
    </nav>

    <main>
        <div class="binnacle">
            <div class="dash-top">
                <div class="status-pill">
                    <span class="material-symbols-rounded" style="font-size:18px">memory</span>
                    <span id="v-status">STATUS // ALPHA 0.2</span>
                </div>
                <div class="gauges">
                    <div class="gauge">
                        <span class="gauge-label">TELEMETRY_CLOCK</span>
                        <span id="clock" class="gauge-val">00:00:00</span>
                    </div>
                    <div class="gauge">
                        <span class="gauge-label">EXT_THERMAL</span>
                        <span id="temp" class="gauge-val">--°F</span>
                    </div>
                </div>
            </div>

            <div class="hero-grid">
                <div class="content">
                    <h1 id="v-title">LUCE<br>ENGINE</h1>
                    <p class="desc" id="v-desc">Precision-engineered with Material 3 Expressive motion and Jony Ive’s tactile depth. Optimized for seamless skin deployment.</p>
                    
                    <div class="actions">
                        <button class="btn primary" onclick="forceDownload('skin')">
                            <span class="material-symbols-rounded">download_2</span>
                            <b>DOWNLOAD SKIN</b>
                        </button>
                        <button class="btn" onclick="forceDownload('model')">
                            <span class="material-symbols-rounded">deployed_code</span>
                            <b>GET GLTF</b>
                        </button>
                    </div>
                </div>

                <div class="viewer-wrap">
                    <model-viewer id="mv" auto-rotate camera-controls shadow-intensity="2" environment-image="neutral" camera-orbit="0deg 75deg 105%" interaction-prompt="none"></model-viewer>
                </div>
            </div>
        </div>
    </main>

    <div class="footer">
        <b>PIX_LABS</b> <span id="f-v">V0.2.0</span> // <span id="f-name">LUCE_CORE</span>
    </div>

    <button id="fab">
        <span class="material-symbols-rounded" style="font-size:36px">tune</span>
    </button>

    <script>
        const VERSIONS = [
            { id: "0.1", name: "ALPHA 0.1", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/skin%20alpha.png", accent: "#D0BCFF", on: "#381E72" },
            { id: "0.2", name: "ALPHA 0.2", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.png", accent: "#FFD400", on: "#000000" }
        ];

        let currentIdx = VERSIONS.length - 1;

        function switchVersion(idx) {
            currentIdx = idx;
            const v = VERSIONS[idx];
            
            // Apply M3 Tonal Palette
            document.documentElement.style.setProperty('--p', v.accent);
            document.documentElement.style.setProperty('--on-p', v.on);
            document.documentElement.style.setProperty('--p-container', v.accent + '22');

            // Update UI with satisfying transition feel
            document.getElementById('v-status').innerText = `STATUS // ${v.name}`;
            document.getElementById('mv').setAttribute('src', v.model);
            document.getElementById('f-v').innerText = `V${v.id}.0`;
            document.getElementById('f-name').innerText = v.name.replace(' ', '_');
            
            // Update Navigation Rail
            document.querySelectorAll('.nav-item').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        async function forceDownload(type) {
            const url = type === 'skin' ? VERSIONS[currentIdx].skin : VERSIONS[currentIdx].model;
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = url.split('/').pop();
                link.click();
            } catch (e) { alert("CONNECTION_ERR"); }
        }

        window.onload = () => {
            const rail = document.getElementById('rail');
            VERSIONS.forEach((v, i) => {
                const b = document.createElement('button');
                b.className = 'nav-item';
                b.innerHTML = `<div class="indicator"></div><b>${i+1}</b><span>V${v.id}</span>`;
                b.onclick = () => switchVersion(i);
                rail.appendChild(b);
            });

            // Reliable Clock
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false });
            }, 1000);

            // Real-time Thermal
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5&longitude=-121.9&current_weather=true&temperature_unit=fahrenheit`)
                .then(r => r.json()).then(data => { 
                    document.getElementById('temp').innerText = `${Math.round(data.current_weather.temperature)}°F`; 
                });

            switchVersion(currentIdx);
        };
    </script>
</body>
</html>
