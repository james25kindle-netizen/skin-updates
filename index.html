<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX_LABS // LUCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --giallo: #FFD400; /* Ferrari Yellow */
            --charcoal: #0D0D0D; 
            --silver: #E0E0E0;
            --anodized: #2A2A2A;
            --spring: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; user-select: none; }
        
        body { 
            background-color: var(--charcoal); 
            color: var(--silver); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; width: 100vw; 
            display: flex; overflow: hidden; 
            letter-spacing: -0.02em;
        }

        /* TACTILE BACKGROUND */
        .glass-grain {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0d0d0d 100%);
            z-index: -1;
        }
        .glass-grain::after {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.03; pointer-events: none;
        }

        /* LUCE BINNACLE (Depth Layers) */
        .binnacle-layer {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }
        .layer-1 { width: 800px; height: 800px; top: -100px; left: -200px; background: radial-gradient(circle, rgba(255,212,0,0.03) 0%, transparent 70%); }

        /* NAV RAIL - Precision Machined */
        nav.nav-rail { 
            width: 80px; height: 100%; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 0; gap: 20px; 
            background: rgba(13,13,13,0.8); 
            border-right: 1px solid rgba(255,255,255,0.05); 
            z-index: 100;
        }
        .rail-brand { font-family: 'Space Grotesk'; font-weight: 700; font-size: 0.8rem; color: var(--giallo); letter-spacing: 2px; }
        
        .v-pill { 
            width: 44px; height: 44px; border-radius: 4px;
            background: var(--anodized); border: 1px solid rgba(255,255,255,0.1);
            color: var(--silver); cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.3s var(--spring);
            font-size: 0.7rem; font-weight: 900;
        }
        .v-pill span { font-size: 0.5rem; opacity: 0.4; margin-top: 2px; }
        .v-pill.active { 
            background: var(--silver); color: var(--charcoal); 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            transform: scale(1.1);
        }

        main { flex: 1; display: grid; grid-template-columns: 1fr 400px; padding: 60px; gap: 80px; align-items: center; }

        /* VIEWER - "Lens" Effect */
        .viewer-wrap {
            position: relative; height: 85%; width: 100%;
            background: #000; border-radius: 20px;
            overflow: hidden; box-shadow: inset 0 0 100px rgba(0,0,0,0.8), 0 40px 100px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* TYPOGRAPHY & CONTENT */
        .content { display: flex; flex-direction: column; gap: 10px; }
        .engine-tag { font-size: 0.65rem; font-weight: 700; color: var(--giallo); letter-spacing: 4px; text-transform: uppercase; opacity: 0.8; }
        h1 { font-family: 'Space Grotesk'; font-size: 3.8rem; font-weight: 300; line-height: 0.9; color: #fff; }
        .desc { font-size: 0.9rem; opacity: 0.5; line-height: 1.6; max-width: 320px; margin-top: 10px; }

        /* MULTIGRAPH BUTTONS */
        .btn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 40px; }
        .luce-btn {
            height: 56px; width: 100%;
            background: var(--anodized); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; font-weight: 700; font-size: 0.75rem; letter-spacing: 1px;
            cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; border-radius: 2px; transition: 0.3s var(--spring);
        }
        .luce-btn:hover { background: #333; border-color: var(--giallo); }
        .luce-btn.primary { background: var(--giallo); color: #000; border: none; }
        .luce-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,212,0,0.2); }

        /* STATUS READOUTS */
        .status-panel { position: fixed; top: 40px; right: 60px; display: flex; gap: 40px; align-items: flex-start; }
        .gauge { display: flex; flex-direction: column; }
        .gauge-label { font-size: 0.55rem; font-weight: 700; opacity: 0.3; letter-spacing: 2px; margin-bottom: 4px; }
        .gauge-val { font-family: 'Space Grotesk'; font-size: 1.4rem; font-weight: 500; color: #fff; }

        /* FOOTER */
        .footer { 
            position: fixed; bottom: 40px; left: 120px; 
            display: flex; align-items: center; gap: 15px;
            font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; opacity: 0.4;
        }
        .footer b { color: var(--giallo); }

        #fab {
            position: fixed; bottom: 40px; right: 60px;
            width: 48px; height: 48px; background: transparent;
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            border-radius: 50%; cursor: pointer; display: grid; place-items: center;
            transition: 0.4s var(--spring);
        }
        #fab:hover { border-color: var(--giallo); color: var(--giallo); transform: rotate(90deg); }

        /* SETTINGS OVERLAY */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 500; display: none; place-items: center;
            backdrop-filter: blur(20px);
        }
        .overlay.open { display: grid; }
        .settings-card { width: 400px; padding: 40px; background: var(--charcoal); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="glass-grain"></div>
    <div class="binnacle-layer layer-1"></div>

    <nav class="nav-rail" id="rail">
        <div class="rail-brand">LUCE</div>
        <div style="flex:1"></div>
        </nav>

    <div class="status-panel">
        <div class="gauge">
            <span class="gauge-label">CHRONO</span>
            <span id="clock" class="gauge-val">00:00:00</span>
        </div>
        <div class="gauge">
            <span class="gauge-label">TEMP_EXT</span>
            <span id="temp" class="gauge-val">--°F</span>
        </div>
    </div>

    <main>
        <div class="viewer-wrap">
            <model-viewer id="mv" auto-rotate camera-controls interaction-prompt="none" shadow-intensity="2" environment-image="neutral" camera-orbit="0deg 75deg 105%" bounds="tight" loading="eager"></model-viewer>
        </div>
        
        <div class="content">
            <p class="engine-tag" id="v-tag">MARANELLO ALPHA // 0.2</p>
            <h1 id="v-title">TECHNICAL ALPHA</h1>
            <p class="desc" id="v-desc">A precision-engineered digital companion. Designed for clarity, optimized for the drive.</p>
            
            <div class="btn-stack">
                <button class="luce-btn primary" onclick="forceDownload('skin')">
                    <span>GENERATE SKIN MAP</span>
                    <span class="material-symbols-rounded" style="font-size:18px;">download</span>
                </button>
                <button class="luce-btn" onclick="forceDownload('model')">
                    <span>EXPORT GLTF 2.0</span>
                    <span class="material-symbols-rounded" style="font-size:18px;">box</span>
                </button>
            </div>
        </div>
    </main>

    <div class="footer">
        <b>PIX_LABS</b> <span>•</span> <span id="f-version">V0.2.0</span> <span>•</span> <span id="f-name">LUCE CORE</span>
    </div>

    <button id="fab" onclick="toggleSettings()">
        <span class="material-symbols-rounded">settings</span>
    </button>

    <div class="overlay" id="overlay">
        <div class="settings-card">
            <h2 style="font-family:'Space Grotesk'; margin-bottom:30px;">SYSTEM_CTRL</h2>
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; opacity:0.6; font-size:0.8rem;">
                <span>24H TIME</span>
                <input type="checkbox" onchange="state.is24h = this.checked">
            </div>
            <button class="luce-btn" onclick="toggleSettings()">RETURN TO COCKPIT</button>
        </div>
    </div>

    <script>
        const VERSIONS = [
            { id: "0.1", name: "ALPHA 0.1", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/skin%20alpha.png" },
            { id: "0.2", name: "ALPHA 0.2", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.png" }
        ];

        let state = { is24h: false };
        let currentIdx = VERSIONS.length - 1;

        function toggleSettings() { document.getElementById('overlay').classList.toggle('open'); }

        function switchVersion(idx) {
            currentIdx = idx;
            const v = VERSIONS[idx];
            document.getElementById('v-tag').innerText = `MARANELLO ALPHA // ${v.id}`;
            document.getElementById('mv').setAttribute('src', v.model);
            document.getElementById('f-version').innerText = `V${v.id}.0`;
            document.getElementById('f-name').innerText = v.name;
            document.querySelectorAll('.v-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        async function forceDownload(type) {
            const url = type === 'skin' ? VERSIONS[currentIdx].skin : VERSIONS[currentIdx].model;
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = url.split('/').pop();
                link.click();
            } catch (e) { alert("XFER_ERROR"); }
        }

        window.onload = () => {
            const rail = document.getElementById('rail');
            VERSIONS.forEach((v, i) => {
                const b = document.createElement('button');
                b.className = 'v-pill';
                b.innerHTML = `${i+1}<span>V${v.id}</span>`;
                b.onclick = () => switchVersion(i);
                rail.appendChild(b);
            });

            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: !state.is24h 
                });
            }, 1000);

            fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5&longitude=-121.9&current_weather=true&temperature_unit=fahrenheit`)
                .then(r => r.json()).then(data => { document.getElementById('temp').innerText = `${Math.round(data.current_weather.temperature)}°F`; });

            switchVersion(currentIdx);
        };
    </script>
</body>
</html>
