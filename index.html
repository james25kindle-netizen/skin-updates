<script>
    const APP_VERSION = "0.5.1"; 
    const PRESETS = [ 
        ["#D1E4FF", "#A6C8FF", "#004A77"], ["#C4EED0", "#A2E0B8", "#006D3B"], 
        ["#FDE293", "#FADB7D", "#A67100"], ["#FFD8E4", "#F9B1C8", "#880E4F"],
        ["#E2E2E6", "#C6C6CA", "#44474E"], ["#FFDBCB", "#FFB68F", "#8B4100"],
        ["#D0BCFF", "#B69DF8", "#4F378B"], ["#B2F0FF", "#82DFFF", "#004F58"],
        ["#FFDAD6", "#FFB4AB", "#930006"], ["#E0E2ED", "#C4C6D0", "#44474E"],
        ["#F3E0FF", "#E6BAFF", "#6E329F"], ["#D9E2FF", "#B1C5FF", "#0042A4"]
    ];
    const VERSIONS = [
        { id: "0.1", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha.gltf", colors: ["#EADDFF", "#D0BCFF", "#6750A4"] },
        { id: "0.2", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.gltf", colors: ["#A3F7EB", "#4FD8C7", "#006A60"] }
    ];

    let state = JSON.parse(localStorage.getItem('pix_pref')) || { oled: false, lastSeen: "0.0.0", themeType: 'default', themeVal: 0 };
    let currentIdx = 1;

    // --- WEATHER ENGINE ---
    async function updateWeather() {
        try {
            // Using wttr.in for a quick, no-key-required JSON feed
            const response = await fetch('https://wttr.in/?format=j1');
            const data = await response.json();
            const temp = data.current_condition[0].temp_F;
            const desc = data.current_condition[0].weatherDesc[0].value.toLowerCase();
            
            document.getElementById('temp').innerText = `${temp}°F`;
            
            // Basic icon switching based on description
            const icon = document.getElementById('w-icon');
            if(desc.includes('sun')) icon.src = "https://cdn.weatherapi.com/weather/64x64/day/113.png";
            else if(desc.includes('cloud')) icon.src = "https://cdn.weatherapi.com/weather/64x64/day/116.png";
            else if(desc.includes('rain')) icon.src = "https://cdn.weatherapi.com/weather/64x64/day/302.png";
            else icon.src = "https://cdn.weatherapi.com/weather/64x64/day/119.png";
        } catch (e) {
            console.log("Weather fetch failed, keeping defaults.");
        }
    }

    function openUpdateModal() {
        document.getElementById('modal-overlay').classList.add('show');
        document.getElementById('new-indicator').style.display = 'none';
    }

    function closeUpdateModal() {
        document.getElementById('modal-overlay').classList.remove('show');
        state.lastSeen = APP_VERSION;
        localStorage.setItem('pix_pref', JSON.stringify(state));
    }

    function checkUpdateStatus() {
        if (state.lastSeen !== APP_VERSION) {
            document.getElementById('new-indicator').style.display = 'inline-block';
            setTimeout(openUpdateModal, 1500);
        }
    }

    function toggleSettings() { document.getElementById('side-sheet').classList.toggle('open'); }

    function setTheme(type, val) {
        state.themeType = type; state.themeVal = val;
        let c = (type === 'default') ? VERSIONS[currentIdx].colors : PRESETS[val];
        document.documentElement.style.setProperty('--bg-1', c[0]);
        document.documentElement.style.setProperty('--bg-2', c[1]);
        document.documentElement.style.setProperty('--p', c[2]);
        localStorage.setItem('pix_pref', JSON.stringify(state));
    }

    function updateOLED(v) { state.oled = v; document.body.classList.toggle('oled', v); localStorage.setItem('pix_pref', JSON.stringify(state)); }

    function switchVersion(idx) {
        currentIdx = idx;
        document.getElementById('v-tag').innerText = `VERSION // ${VERSIONS[idx].id}`;
        document.getElementById('mv').setAttribute('src', VERSIONS[idx].model);
        document.querySelectorAll('.v-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
        setTheme(state.themeType, state.themeVal);
    }

    window.onload = () => {
        checkUpdateStatus();
        updateWeather(); // Initial weather call
        
        const grid = document.getElementById('preset-grid');
        PRESETS.forEach((p, i) => {
            const d = document.createElement('div'); d.className = 'color-circle';
            d.style.backgroundColor = p[2]; d.onclick = () => setTheme('preset', i);
            grid.appendChild(d);
        });
        VERSIONS.forEach((_, i) => {
            const b = document.createElement('button'); b.className = 'v-pill';
            b.innerHTML = i+1; b.onclick = () => switchVersion(i);
            document.getElementById('rail').appendChild(b);
        });
        
        updateOLED(state.oled);
        switchVersion(currentIdx);
        
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Refresh weather every 15 minutes
        setInterval(updateWeather, 900000);
    };
</script>
