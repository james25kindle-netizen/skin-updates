<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX_LABS // HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Outfit:wght@300;500;900&family=Bebas+Neue&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --p: #6750A4; --on-s-container: #1D192B; --bg-1: #EADDFF; --bg-2: #D0BCFF; 
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --m3-bouncy: cubic-bezier(0.47, 1.64, 0.41, 0.8);
            --blur: 60px;
        }

        body.oled { background-color: #000 !important; color: #FFFFFF !important; }
        body.oled .viewer-box { background: #0a0a0a !important; border: 1px solid #1a1a1a; }
        body.oled .side-sheet, body.oled .update-modal { background: #121212; border-left: 1px solid #333; color: #fff; }
        body.oled .m3-btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; user-select: none; }
        body { background-color: #fdf8fd; color: var(--on-s-container); font-family: 'Outfit', sans-serif; height: 100vh; width: 100vw; display: flex; overflow: hidden; transition: 0.5s ease; }
        
        .aura-bg { position: fixed; inset: 0; background: radial-gradient(circle at var(--ax, 50%) var(--ay, 50%), var(--bg-1) 0%, transparent 50%), radial-gradient(circle at 20% 80%, var(--bg-2) 0%, transparent 40%); z-index: -1; filter: blur(var(--blur)); transition: 0.8s cubic-bezier(0.2, 0, 0, 1); }
        
        nav.nav-rail { width: 90px; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 12px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-right: 1px solid rgba(0,0,0,0.05); z-index: 50; }
        .v-pill { width: 48px; height: 48px; border-radius: 24px; background: rgba(0,0,0,0.05); border: none; cursor: pointer; display: grid; place-items: center; font-weight: 900; color: inherit; transition: 0.5s var(--spring); }
        .v-pill.active { height: 80px; width: 34px; border-radius: 17px; background: var(--p); color: white; }

        main { flex: 1; display: grid; grid-template-columns: 1fr 450px; padding: 40px; gap: 40px; align-items: center; }
        .viewer-box { height: 90%; background: white; border-radius: 48px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.03); }
        model-viewer { width: 100%; height: 100%; }
        
        h1 { font-family: 'Bebas Neue'; font-size: 8.5rem; line-height: 0.8; letter-spacing: -3px; }

        .btn-group { display: flex; gap: 12px; width: 100%; margin-top: 20px; }
        .m3-btn { 
            flex: 1; height: 64px; border-radius: 32px; background: var(--p); color: white; border: none; font-weight: 800; cursor: pointer; 
            transition: flex 0.6s var(--m3-bouncy), transform 0.4s var(--m3-bouncy); 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }
        .m3-btn-secondary { background: rgba(0,0,0,0.05); color: var(--on-s-container); }
        .btn-group:has(.m3-btn:hover) .m3-btn:not(:hover) { flex: 0.7; opacity: 0.7; }
        .m3-btn:hover { flex: 1.8; transform: translateY(-4px); }
        .m3-btn:active { transform: scale(0.92); flex: 2.2; }

        .progress-bar { position: absolute; bottom: 0; left: 0; height: 100%; background: rgba(255,255,255,0.2); width: 0%; transition: width 1.5s ease; z-index: 1; }

        /* SIDE SHEET ENHANCEMENTS */
        .side-sheet { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: white; z-index: 300; transition: right 0.5s var(--spring); padding: 40px; display: flex; flex-direction: column; gap: 25px; box-shadow: -20px 0 60px rgba(0,0,0,0.05); overflow-y: auto; }
        .side-sheet.open { right: 0; }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .setting-label { font-weight: 600; font-size: 0.95rem; }

        .custom-color-box { background: rgba(0,0,0,0.04); padding: 15px; border-radius: 20px; margin-top: 10px; }
        .hex-input { width: 100%; background: transparent; border: 2px solid rgba(0,0,0,0.1); padding: 12px; border-radius: 12px; font-family: 'Space Grotesk'; font-weight: 700; margin-top: 10px; color: inherit; }

        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .color-circle { width: 100%; aspect-ratio: 1; border-radius: 12px; cursor: pointer; border: 2px solid rgba(0,0,0,0.05); transition: 0.3s; }

        .v-info-bottom { position: fixed; bottom: 20px; left: 110px; background: rgba(0,0,0,0.03); padding: 10px 18px; border-radius: 18px; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; z-index: 100; transition: 0.3s var(--spring); }
    </style>
</head>
<body onmousemove="updateAuraPos(event)">

    <div class="aura-bg" id="aura"></div>

    <nav class="nav-rail" id="rail">
        <div style="font-family:'Michroma'; font-size:0.75rem; margin-bottom:20px;">PIX</div>
    </nav>

    <main>
        <div class="viewer-box">
            <model-viewer id="mv" auto-rotate camera-controls shadow-intensity="1" environment-image="neutral"></model-viewer>
        </div>
        <div class="content">
            <p id="v-tag" style="font-weight:900; opacity:0.3; letter-spacing:5px; font-size:0.8rem;">VERSION // 0.2</p>
            <h1 id="v-title">ALPHA</h1>
            <div class="btn-group">
                <button id="btn-skin" class="m3-btn" onclick="simulateDownload('btn-skin')" onmouseenter="shiftAura('left')" onmouseleave="resetAura()">
                    <div class="progress-bar"></div>
                    <span class="btn-content">GET SKIN</span>
                </button>
                <button id="btn-model" class="m3-btn m3-btn-secondary" onclick="simulateDownload('btn-model')" onmouseenter="shiftAura('right')" onmouseleave="resetAura()">
                    <div class="progress-bar"></div>
                    <span class="btn-content">GET MODEL</span>
                </button>
            </div>
        </div>
    </main>

    <div class="side-sheet" id="side-sheet">
        <h2 style="font-family:'Space Grotesk'; font-size: 1.8rem;">Settings</h2>
        
        <div class="custom-color-box">
            <span class="setting-label">Custom Theme Color</span>
            <input type="text" class="hex-input" id="hex-field" placeholder="#6750A4" oninput="applyCustomHex(this.value)">
            <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 8px;">Enter any HEX code to generate a custom Material You palette.</p>
        </div>

        <div class="color-grid" id="preset-grid"></div>

        <hr style="opacity:0.1;">

        <div class="setting-row">
            <span class="setting-label">OLED Black Mode</span>
            <input type="checkbox" id="oled-toggle" onchange="updateOLED(this.checked)">
        </div>

        <div class="setting-row">
            <span class="setting-label">Model Auto-Rotate</span>
            <input type="checkbox" id="rotate-toggle" checked onchange="toggleRotation(this.checked)">
        </div>

        <div class="setting-row">
            <span class="setting-label">Blur Intensity</span>
            <input type="range" min="20" max="120" value="60" oninput="updateBlur(this.value)">
        </div>

        <button onclick="toggleSettings()" style="margin-top:auto; padding:20px; border-radius:20px; border:none; background:var(--p); color:white; cursor:pointer; font-weight:900;">SAVE & CLOSE</button>
    </div>

    <button id="settings-fab" onclick="toggleSettings()" style="position:fixed; bottom:30px; right:30px; width:64px; height:64px; border-radius:24px; background:var(--p); color:white; border:none; cursor:pointer; z-index:200; display:grid; place-items:center; box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
        <span class="material-symbols-rounded">tune</span>
    </button>

    <script>
        const PRESETS = [ 
            ["#D1E4FF", "#A6C8FF", "#004A77"], ["#C4EED0", "#A2E0B8", "#006D3B"], 
            ["#FDE293", "#FADB7D", "#A67100"], ["#FFD8E4", "#F9B1C8", "#880E4F"]
        ];
        const VERSIONS = [
            { id: "0.1", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha.gltf", colors: ["#EADDFF", "#D0BCFF", "#6750A4"] },
            { id: "0.2", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.gltf", colors: ["#A3F7EB", "#4FD8C7", "#006A60"] }
        ];

        let state = JSON.parse(localStorage.getItem('pix_pref')) || { oled: false, blur: 60, customHex: "" };
        let currentIdx = 1;

        function updateAuraPos(e) {
            document.documentElement.style.setProperty('--ax', `${(e.clientX / window.innerWidth) * 100}%`);
            document.documentElement.style.setProperty('--ay', `${(e.clientY / window.innerHeight) * 100}%`);
        }
        function shiftAura(side) { document.documentElement.style.setProperty('--ax', side === 'left' ? '20%' : '80%'); }
        function resetAura() { document.documentElement.style.setProperty('--ax', '50%'); }

        function toggleSettings() { document.getElementById('side-sheet').classList.toggle('open'); }
        
        function applyCustomHex(hex) {
            if (/^#[0-9A-F]{6}$/i.test(hex)) {
                document.documentElement.style.setProperty('--p', hex);
                document.documentElement.style.setProperty('--bg-1', hex + "44"); // Tints
                state.customHex = hex;
                localStorage.setItem('pix_pref', JSON.stringify(state));
            }
        }

        function updateBlur(val) {
            document.documentElement.style.setProperty('--blur', val + 'px');
            state.blur = val;
            localStorage.setItem('pix_pref', JSON.stringify(state));
        }

        function toggleRotation(v) { document.getElementById('mv').autoRotate = v; }

        function updateOLED(v) { 
            state.oled = v; document.body.classList.toggle('oled', v); 
            localStorage.setItem('pix_pref', JSON.stringify(state)); 
        }

        function switchVersion(idx) {
            currentIdx = idx;
            document.getElementById('mv').setAttribute('src', VERSIONS[idx].model);
            const c = VERSIONS[idx].colors;
            document.documentElement.style.setProperty('--bg-1', c[0]);
            document.documentElement.style.setProperty('--bg-2', c[1]);
            document.documentElement.style.setProperty('--p', c[2]);
            document.querySelectorAll('.v-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        function simulateDownload(btnId) {
            const btn = document.getElementById(btnId);
            const bar = btn.querySelector('.progress-bar');
            bar.style.width = "100%";
            setTimeout(() => { bar.style.transition = "none"; bar.style.width = "0%"; setTimeout(() => bar.style.transition = "width 1.5s ease", 100); }, 2000);
        }

        window.onload = () => {
            const grid = document.getElementById('preset-grid');
            PRESETS.forEach((p, i) => {
                const d = document.createElement('div'); d.className = 'color-circle';
                d.style.backgroundColor = p[2]; d.onclick = () => {
                    document.documentElement.style.setProperty('--p', p[2]);
                    document.documentElement.style.setProperty('--bg-1', p[0]);
                };
                grid.appendChild(d);
            });
            VERSIONS.forEach((_, i) => {
                const b = document.createElement('button'); b.className = 'v-pill';
                b.innerHTML = i+1; b.onclick = () => switchVersion(i);
                document.getElementById('rail').appendChild(b);
            });
            updateOLED(state.oled);
            updateBlur(state.blur);
            if(state.customHex) {
                document.getElementById('hex-field').value = state.customHex;
                applyCustomHex(state.customHex);
            }
            switchVersion(currentIdx);
        };
    </script>
</body>
</html>
