<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX_LABS // EXPRESSIVE_LUCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --p: #FFD400; /* Primary Accent */
            --on-p: #000000;
            --p-container: rgba(255, 212, 0, 0.1);
            --charcoal: #050505; 
            --glass: rgba(255, 255, 255, 0.03);
            --spring-heavy: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-fluid: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; user-select: none; }
        body { 
            background-color: var(--charcoal); 
            color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; width: 100vw; display: flex; overflow: hidden;
            transition: background 0.8s ease;
        }

        /* JONY IVE TACTILE BACKGROUND */
        .viewport-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 120%, var(--p-container) 0%, #050505 70%);
            transition: background 0.8s ease;
        }
        .viewport-bg::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05; mix-blend-mode: overlay;
        }

        /* M3 EXPRESSIVE RAIL */
        nav.nav-rail { 
            width: 100px; height: 100%; display: flex; flex-direction: column; 
            align-items: center; padding: 32px 0; gap: 32px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .nav-item {
            width: 64px; height: 64px; border-radius: 20px; 
            background: transparent; border: none; color: #fff;
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: 0.5s var(--spring-heavy); position: relative;
        }
        .nav-item .indicator {
            position: absolute; inset: 0; background: var(--p);
            border-radius: 32px; transform: scaleX(0.5) scaleY(0.2); opacity: 0;
            transition: 0.5s var(--spring-heavy); z-index: -1;
        }
        .nav-item.active .indicator { transform: scaleX(1) scaleY(1); opacity: 1; border-radius: 20px; }
        .nav-item.active { color: var(--on-p); transform: translateY(-4px); }
        .nav-item b { font-size: 1.1rem; position: relative; z-index: 2; }
        .nav-item span { font-size: 0.55rem; font-weight: 900; margin-top: 4px; opacity: 0.4; transition: 0.3s; }
        .nav-item.active span { opacity: 0.8; color: var(--on-p); }

        /* THE BINNACLE (Integrated UI) */
        main { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .binnacle-wrap {
            width: 100%; height: 85%; max-width: 1300px;
            position: relative; border-radius: 48px;
            background: linear-gradient(145deg, #0f0f0f, #050505);
            box-shadow: 0 60px 120px rgba(0,0,0,0.9), inset 0 0 80px var(--p-container);
            border: 1px solid rgba(255,255,255,0.03);
            display: flex; align-items: center; padding: 80px; gap: 80px;
            transition: box-shadow 0.8s ease;
        }

        /* INSTRUMENT CLUSTER */
        .instruments { position: absolute; top: 48px; right: 80px; display: flex; gap: 40px; }
        .gauge { text-align: right; }
        .gauge-label { font-size: 0.6rem; font-weight: 900; color: var(--p); letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; }
        .gauge-val { font-family: 'Space Grotesk'; font-size: 1.8rem; font-weight: 300; display: block; color: #fff; }

        /* CONTENT ENGINE */
        .info-panel { flex: 1; animation: slideIn 0.8s var(--spring-heavy); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        
        .version-badge {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 8px 16px; background: var(--p-container);
            border-radius: 100px; color: var(--p);
            font-size: 0.75rem; font-weight: 900; letter-spacing: 1px;
            margin-bottom: 24px; border: 1px solid var(--p);
            transition: 0.5s ease;
        }
        h1 { font-size: 5rem; font-weight: 900; line-height: 0.85; letter-spacing: -5px; margin-bottom: 24px; }
        .desc { font-size: 1.2rem; opacity: 0.5; line-height: 1.6; max-width: 420px; font-weight: 300; }

        /* EXPRESSIVE ACTION BUTTONS */
        .btn-row { display: flex; gap: 20px; margin-top: 56px; }
        .m3-action {
            height: 72px; flex: 1; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--glass);
            color: #fff; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 14px;
            transition: 0.4s var(--spring-fluid);
        }
        .m3-action:hover { background: rgba(255,255,255,0.08); transform: translateY(-6px); border-color: var(--p); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .m3-action:active { transform: scale(0.92); }
        .m3-action.primary { background: var(--p); color: var(--on-p); border: none; }
        
        .progress-overlay {
            position: absolute; bottom: 0; left: 0; height: 100%;
            background: rgba(255,255,255,0.2); width: 0%; transition: width 0.4s var(--spring-heavy);
        }

        /* SETTINGS FAB */
        #settings-fab {
            position: fixed; bottom: 40px; right: 40px;
            width: 80px; height: 80px; border-radius: 28px;
            background: #111; color: var(--p);
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            display: grid; place-items: center; z-index: 200;
            transition: 0.6s var(--spring-heavy);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #settings-fab:hover { border-radius: 40px; transform: scale(1.1) rotate(90deg); background: var(--p); color: var(--on-p); }

        /* FOOTER PRECISION */
        .footer {
            position: fixed; bottom: 40px; left: 140px;
            font-size: 0.7rem; font-weight: 900; letter-spacing: 3px;
            color: rgba(255,255,255,0.3); text-transform: uppercase;
        }
        .footer b { color: var(--p); margin-right: 10px; transition: color 0.5s; }

        model-viewer { width: 550px; height: 550px; --poster-color: transparent; transition: transform 0.5s var(--spring-heavy); }
        model-viewer:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="viewport-bg"></div>

    <nav class="nav-rail" id="rail">
        <div style="font-family:'Space Grotesk'; font-weight:700; color:var(--p); font-size:1.2rem; margin-bottom:10px;">P</div>
        </nav>

    <div class="instruments">
        <div class="gauge">
            <span class="gauge-label">TELEMETRY_TIME</span>
            <span id="clock" class="gauge-val">00:00:00</span>
        </div>
        <div class="gauge">
            <span class="gauge-label">EXT_THERMAL</span>
            <span id="temp" class="gauge-val">--°F</span>
        </div>
    </div>

    <main>
        <div class="binnacle-wrap">
            <div class="info-panel">
                <div class="version-badge">
                    <span class="material-symbols-rounded" style="font-size:16px">bolt</span>
                    <span id="v-badge-text">STATUS // ALPHA 0.2</span>
                </div>
                <h1 id="v-title">LUCE<br>ENGINE</h1>
                <p class="desc" id="v-desc">Re-engineered with Material 3 Expressive motion and Jony Ive’s tactile precision. The ultimate skin deployment hub.</p>
                
                <div class="btn-row">
                    <button class="m3-action primary" onclick="forceDownload('skin')">
                        <span class="material-symbols-rounded">download_2</span>
                        <b>DOWNLOAD SKIN</b>
                        <div class="progress-overlay" id="p-skin"></div>
                    </button>
                    <button class="m3-action" onclick="forceDownload('model')">
                        <span class="material-symbols-rounded">box</span>
                        <b>GET GLTF</b>
                        <div class="progress-overlay" id="p-model"></div>
                    </button>
                </div>
            </div>

            <model-viewer id="mv" auto-rotate camera-controls shadow-intensity="2" environment-image="neutral" camera-orbit="0deg 75deg 105%" loading="eager" interaction-prompt="none"></model-viewer>
        </div>
    </main>

    <div class="footer">
        <b id="f-brand">PIX_LABS</b> <span id="f-version">V0.2.0</span> // <span id="f-name">LUCE CORE</span>
    </div>

    <button id="settings-fab" onclick="alert('SYSTEM_CALIBRATION_ACTIVE')">
        <span class="material-symbols-rounded" style="font-size:36px">settings_input_component</span>
    </button>

    <script>
        // M3 EXPRESSIVE COLORS PER VERSION
        const VERSIONS = [
            { 
                id: "0.1", 
                name: "ALPHA 0.1", 
                model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha.gltf", 
                skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/skin%20alpha.png",
                accent: "#D0BCFF", // M3 Expressive Purple
                onAccent: "#381E72"
            },
            { 
                id: "0.2", 
                name: "ALPHA 0.2", 
                model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.gltf", 
                skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.png",
                accent: "#FFD400", // M3 Expressive Gold (Luce)
                onAccent: "#000000"
            }
        ];

        let currentIdx = VERSIONS.length - 1; // Start on newest

        function switchVersion(idx) {
            currentIdx = idx;
            const v = VERSIONS[idx];
            
            // Apply M3 Expressive Colors
            document.documentElement.style.setProperty('--p', v.accent);
            document.documentElement.style.setProperty('--on-p', v.onAccent);
            document.documentElement.style.setProperty('--p-container', v.accent + '22');

            // Update UI Content
            document.getElementById('v-badge-text').innerText = `STATUS // ${v.name}`;
            document.getElementById('mv').setAttribute('src', v.model);
            document.getElementById('f-version').innerText = `V${v.id}.0`;
            document.getElementById('f-name').innerText = v.name;
            
            // Rail State
            document.querySelectorAll('.nav-item').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        async function forceDownload(type) {
            const bar = document.getElementById(type === 'skin' ? 'p-skin' : 'p-model');
            const url = type === 'skin' ? VERSIONS[currentIdx].skin : VERSIONS[currentIdx].model;
            
            bar.style.width = "100%";
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = url.split('/').pop();
                link.click();
            } catch (e) { console.error("XFER_FAILURE"); }
            setTimeout(() => bar.style.width = "0%", 1000);
        }

        window.onload = () => {
            const rail = document.getElementById('rail');
            VERSIONS.forEach((v, i) => {
                const b = document.createElement('button');
                b.className = 'nav-item';
                b.innerHTML = `<div class="indicator"></div><b>${i+1}</b><span>V${v.id}</span>`;
                b.onclick = () => switchVersion(i);
                rail.appendChild(b);
            });

            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
                });
            }, 1000);

            fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5&longitude=-121.9&current_weather=true&temperature_unit=fahrenheit`)
                .then(r => r.json()).then(data => { 
                    document.getElementById('temp').innerText = `${Math.round(data.current_weather.temperature)}°F`; 
                });

            switchVersion(currentIdx);
        };
    </script>
</body>
</html>
