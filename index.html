<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX_LABS // LUCE_EXPRESSIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --p: #FFD400; /* Primary */
            --on-p: #000000;
            --p-container: rgba(255, 212, 0, 0.15);
            --surface: #0A0A0A;
            --outline: rgba(255, 255, 255, 0.1);
            --spring: cubic-bezier(0.3, 1.5, 0.5, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }
        body { 
            background-color: #050505; color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; width: 100vw; display: flex; overflow: hidden;
            transition: background 1s ease;
        }

        /* CUSTOM CURSOR (Tactile feel) */
        #cursor {
            position: fixed; width: 10px; height: 10px; background: var(--p);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease, background 0.5s ease;
        }

        /* BACKGROUND ENGINE */
        .viewport-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 110%, var(--p-container) 0%, #050505 60%);
            transition: 0.8s ease;
        }

        /* M3 EXPRESSIVE RAIL */
        nav.nav-rail { 
            width: 110px; height: 100%; display: flex; flex-direction: column; 
            align-items: center; padding: 40px 0; gap: 30px;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(20px);
            border-right: 1px solid var(--outline); z-index: 100;
        }
        .brand { font-family: 'Space Grotesk'; font-weight: 700; color: var(--p); font-size: 1.5rem; margin-bottom: 10px; }
        
        .nav-item {
            width: 72px; height: 72px; border-radius: 24px; 
            background: transparent; border: none; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s var(--spring); position: relative;
        }
        .nav-item .indicator {
            position: absolute; inset: 0; background: var(--p);
            border-radius: 36px; transform: scaleX(0.4) scaleY(0.1); opacity: 0;
            transition: 0.5s var(--spring); z-index: -1;
        }
        .nav-item.active .indicator { transform: scale(1); opacity: 1; border-radius: 24px; }
        .nav-item.active { color: var(--on-p); }
        .nav-item b { font-size: 1.2rem; line-height: 1; }
        .nav-item span { font-size: 0.6rem; font-weight: 900; opacity: 0.4; margin-top: 4px; }
        .nav-item.active span { opacity: 0.7; color: var(--on-p); }

        /* THE BINNACLE (Main Housing) */
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 60px; }
        .binnacle-wrap {
            width: 100%; height: 100%; max-height: 800px;
            background: linear-gradient(145deg, #0F0F0F, #050505);
            border-radius: 56px; border: 1px solid var(--outline);
            display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; padding: 80px;
            position: relative; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 60px var(--p-container);
            transition: box-shadow 0.8s ease;
        }

        /* DATA GAUGES */
        .gauges { position: absolute; top: 40px; right: 60px; display: flex; gap: 40px; }
        .gauge-item { text-align: right; }
        .gauge-label { font-size: 0.65rem; font-weight: 900; color: var(--p); letter-spacing: 2px; opacity: 0.6; }
        .gauge-val { font-family: 'Space Grotesk'; font-size: 1.8rem; font-weight: 300; }

        /* CONTENT */
        .content { display: flex; flex-direction: column; justify-content: center; z-index: 10; }
        .status-pill {
            align-self: flex-start; padding: 8px 16px; border-radius: 100px;
            background: var(--p-container); color: var(--p); border: 1px solid var(--p);
            font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; margin-bottom: 24px;
            display: flex; align-items: center; gap: 8px;
        }
        h1 { font-size: 5.5rem; font-weight: 900; line-height: 0.85; letter-spacing: -5px; margin-bottom: 20px; text-transform: uppercase; }
        .desc { font-size: 1.15rem; opacity: 0.5; line-height: 1.6; max-width: 440px; font-weight: 300; }

        /* BUTTONS */
        .actions { display: flex; gap: 16px; margin-top: 48px; }
        .btn {
            height: 72px; flex: 1; border-radius: 24px; font-weight: 900; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            border: 1px solid var(--outline); background: rgba(255,255,255,0.03); color: #fff;
            transition: 0.3s var(--spring); position: relative; overflow: hidden;
        }
        .btn.primary { background: var(--p); color: var(--on-p); border: none; }
        .btn:hover { transform: translateY(-4px) scale(1.02); border-color: var(--p); }
        .btn.primary:hover { box-shadow: 0 20px 40px var(--p-container); }
        
        .progress { position: absolute; bottom: 0; left: 0; height: 100%; background: rgba(255,255,255,0.2); width: 0%; transition: 0.4s ease; }

        /* VIEWER */
        .viewer-box { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        model-viewer { width: 100%; height: 110%; --poster-color: transparent; }

        /* FOOTER */
        .footer { 
            position: fixed; bottom: 40px; left: 150px; 
            font-size: 0.7rem; font-weight: 900; letter-spacing: 3px; 
            opacity: 0.4; text-transform: uppercase; 
        }
        .footer b { color: var(--p); margin-right: 12px; }

        /* M3 FAB */
        #fab {
            position: fixed; bottom: 40px; right: 40px;
            width: 80px; height: 80px; border-radius: 28px;
            background: #111; color: var(--p); border: 1px solid var(--outline);
            display: grid; place-items: center; transition: 0.5s var(--spring);
        }
        #fab:hover { border-radius: 40px; background: var(--p); color: var(--on-p); transform: scale(1.1) rotate(90deg); }

    </style>
</head>
<body>
    <div id="cursor"></div>
    <div class="viewport-bg"></div>

    <nav class="nav-rail" id="rail">
        <div class="brand">P</div>
    </nav>

    <div class="gauges">
        <div class="gauge-item">
            <span class="gauge-label">TELEMETRY_TIME</span>
            <span id="clock" class="gauge-val">00:00:00</span>
        </div>
        <div class="gauge-item">
            <span class="gauge-label">EXT_THERMAL</span>
            <span id="temp" class="gauge-val">--°F</span>
        </div>
    </div>

    <main>
        <div class="binnacle-wrap" id="binnacle">
            <div class="content">
                <div class="status-pill">
                    <span class="material-symbols-rounded" style="font-size:16px">bolt</span>
                    <span id="status-txt">STATUS // ALPHA 0.2</span>
                </div>
                <h1 id="v-title">LUCE<br>ENGINE</h1>
                <p class="desc" id="v-desc">Precision-engineered with Material 3 Expressive motion and Jony Ive’s tactile depth. Optimized for seamless skin deployment.</p>
                
                <div class="actions">
                    <button class="btn primary" onclick="forceDownload('skin')">
                        <span class="material-symbols-rounded">download_2</span>
                        DOWNLOAD SKIN
                        <div class="progress" id="p-skin"></div>
                    </button>
                    <button class="btn" onclick="forceDownload('model')">
                        <span class="material-symbols-rounded">box</span>
                        GET GLTF
                        <div class="progress" id="p-model"></div>
                    </button>
                </div>
            </div>

            <div class="viewer-box">
                <model-viewer id="mv" auto-rotate camera-controls shadow-intensity="2" environment-image="neutral" camera-orbit="0deg 75deg 105%" interaction-prompt="none"></model-viewer>
            </div>
        </div>
    </main>

    <div class="footer">
        <b>PIX_LABS</b> <span id="f-v">V0.2.0</span> // <span id="f-name">LUCE_CORE</span>
    </div>

    <button id="fab">
        <span class="material-symbols-rounded" style="font-size:36px">settings_input_component</span>
    </button>

    <script>
        const VERSIONS = [
            { id: "0.1", name: "ALPHA 0.1", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/skin%20alpha.png", accent: "#D0BCFF", on: "#381E72" },
            { id: "0.2", name: "ALPHA 0.2", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.png", accent: "#FFD400", on: "#000000" }
        ];

        let currentIdx = VERSIONS.length - 1;

        // Custom Cursor Logic
        document.addEventListener('mousemove', e => {
            const cursor = document.getElementById('cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function switchVersion(idx) {
            currentIdx = idx;
            const v = VERSIONS[idx];
            
            // Apply M3 Expressive Colors
            document.documentElement.style.setProperty('--p', v.accent);
            document.documentElement.style.setProperty('--on-p', v.on);
            document.documentElement.style.setProperty('--p-container', v.accent + '26');

            // Update UI
            document.getElementById('status-txt').innerText = `STATUS // ${v.name}`;
            document.getElementById('mv').setAttribute('src', v.model);
            document.getElementById('f-v').innerText = `V${v.id}.0`;
            document.getElementById('f-name').innerText = v.name.replace(' ', '_');
            
            // Rail Logic
            document.querySelectorAll('.nav-item').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        async function forceDownload(type) {
            const bar = document.getElementById(type === 'skin' ? 'p-skin' : 'p-model');
            const url = type === 'skin' ? VERSIONS[currentIdx].skin : VERSIONS[currentIdx].model;
            bar.style.width = "100%";
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = url.split('/').pop();
                link.click();
            } catch (e) { console.error("XFER_FAIL"); }
            setTimeout(() => bar.style.width = "0%", 1500);
        }

        window.onload = () => {
            const rail = document.getElementById('rail');
            VERSIONS.forEach((v, i) => {
                const b = document.createElement('button');
                b.className = 'nav-item';
                b.innerHTML = `<div class="indicator"></div><b>${i+1}</b><span>V${v.id}</span>`;
                b.onclick = () => switchVersion(i);
                rail.appendChild(b);
            });

            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false });
            }, 1000);

            fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5&longitude=-121.9&current_weather=true&temperature_unit=fahrenheit`)
                .then(r => r.json()).then(data => { 
                    document.getElementById('temp').innerText = `${Math.round(data.current_weather.temperature)}°F`; 
                });

            switchVersion(currentIdx);
        };
    </script>
</body>
</html>
