<script>

    function simulateDownload(btnId) {
        const btn = document.getElementById(btnId);
        const bar = btn.querySelector('.progress-bar');
        const label = btn.querySelector('.btn-content');
        const originalText = label.innerText;
        
        // 1. Start the Bouncy Visuals
        bar.style.width = "100%";
        label.innerText = "SQUASHING...";
        
        setTimeout(() => {
            // 2. Trigger the actual File Download
            const currentModelUrl = VERSIONS[currentIdx].model;
            
            if (btnId === 'btn-model') {
                triggerDownload(currentModelUrl, `PIX_MODEL_V${VERSIONS[currentIdx].id}.gltf`);
            } else {
                // For 'GET SKIN', we trigger a download of the model as a placeholder 
                // or you can replace this string with a specific .png skin URL
                triggerDownload(currentModelUrl, `PIX_SKIN_V${VERSIONS[currentIdx].id}.png`);
            }

            // 3. Reset Button State
            bar.style.transition = "none";
            bar.style.width = "0%";
            label.innerText = "DOWNLOADED!";
            
            setTimeout(() => {
                bar.style.transition = "width 1.5s ease";
                label.innerText = originalText;
            }, 1500);
        }, 2000);
    }

    function triggerDownload(url, filename) {
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        anchor.target = "_blank"; // Safety for cross-origin
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
    }

</script>
