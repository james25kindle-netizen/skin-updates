<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX_LABS // LUCE_EXPRESSIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --giallo: #FFD400; 
            --charcoal: #080808; 
            --glass: rgba(255, 255, 255, 0.03);
            --spring-heavy: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-fluid: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; user-select: none; }
        body { 
            background-color: var(--charcoal); 
            color: #fff; font-family: 'Outfit', sans-serif;
            height: 100vh; width: 100vw; display: flex; overflow: hidden;
        }

        /* TACTILE DEPTH */
        .viewport-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 120%, #1a1500 0%, #080808 60%);
        }
        .viewport-bg::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1; mix-blend-mode: overlay;
        }

        /* MATERIAL 3 NAV RAIL (Expressive) */
        nav.nav-rail { 
            width: 96px; height: 100%; display: flex; flex-direction: column; 
            align-items: center; padding: 32px 0; gap: 24px;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .nav-item {
            width: 56px; height: 56px; border-radius: 16px; 
            background: transparent; border: none; color: #fff;
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: 0.4s var(--spring-heavy); position: relative;
        }
        .nav-item .indicator {
            position: absolute; inset: 0; background: var(--giallo);
            border-radius: 28px; transform: scaleX(0); opacity: 0;
            transition: 0.4s var(--spring-heavy); z-index: -1;
        }
        .nav-item.active .indicator { transform: scaleX(1); opacity: 1; border-radius: 16px; }
        .nav-item.active { color: #000; transform: scale(1.1); }
        .nav-item span { font-size: 0.6rem; font-weight: 900; margin-top: 4px; opacity: 0.5; }
        .nav-item.active span { opacity: 1; }

        /* THE BINNACLE (Viewer) */
        main { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .binnacle-wrap {
            width: 100%; height: 85%; max-width: 1200px;
            position: relative; border-radius: 40px;
            background: linear-gradient(145deg, #111, #050505);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,212,0,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; padding: 60px; gap: 60px;
        }

        /* INSTRUMENT CLUSTER (Clock/Weather) */
        .instruments {
            position: absolute; top: 40px; right: 60px; display: flex; gap: 32px;
        }
        .gauge { text-align: right; }
        .gauge-label { font-size: 0.6rem; font-weight: 900; color: var(--giallo); letter-spacing: 2px; opacity: 0.4; }
        .gauge-val { font-family: 'Space Grotesk'; font-size: 1.6rem; font-weight: 300; display: block; }

        /* CONTENT ENGINE */
        .info-panel { flex: 1; }
        .version-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 12px; background: rgba(255,212,0,0.1);
            border-radius: 100px; color: var(--giallo);
            font-size: 0.7rem; font-weight: 900; letter-spacing: 1px;
            margin-bottom: 24px; border: 1px solid rgba(255,212,0,0.2);
        }
        h1 { font-size: 4.5rem; font-weight: 900; line-height: 0.85; letter-spacing: -4px; margin-bottom: 20px; }
        .desc { font-size: 1.1rem; opacity: 0.4; line-height: 1.5; max-width: 400px; font-weight: 300; }

        /* EXPRESSIVE BUTTONS */
        .btn-row { display: flex; gap: 16px; margin-top: 48px; }
        .m3-action {
            height: 64px; flex: 1; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--glass);
            color: #fff; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.4s var(--spring-fluid);
        }
        .m3-action:hover { background: rgba(255,255,255,0.08); transform: translateY(-4px) scale(1.02); border-color: var(--giallo); }
        .m3-action:active { transform: scale(0.95); }
        .m3-action.primary { background: var(--giallo); color: #000; border: none; }
        
        .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 4px;
            background: rgba(0,0,0,0.2); width: 0%; transition: width 0.3s ease;
        }

        /* SETTINGS FAB */
        #settings-fab {
            position: fixed; bottom: 40px; right: 40px;
            width: 72px; height: 72px; border-radius: 24px;
            background: #1a1a1a; color: var(--giallo);
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
            display: grid; place-items: center; z-index: 200;
            transition: 0.5s var(--spring-heavy);
        }
        #settings-fab:hover { border-radius: 36px; transform: scale(1.1) rotate(90deg); background: var(--giallo); color: #000; }

        /* CALIBRATION SHEET */
        .sheet {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(30px); z-index: 500;
            display: none; place-items: center; opacity: 0; transition: 0.4s;
        }
        .sheet.open { display: grid; opacity: 1; }
        .sheet-card {
            width: 440px; background: #0d0d0d; border-radius: 40px;
            padding: 48px; border: 1px solid rgba(255,255,255,0.08);
            transform: translateY(40px); transition: 0.5s var(--spring-heavy);
        }
        .sheet.open .sheet-card { transform: translateY(0); }

        /* FOOTER PRECISION */
        .footer {
            position: fixed; bottom: 40px; left: 136px;
            font-size: 0.65rem; font-weight: 900; letter-spacing: 2px;
            color: rgba(255,255,255,0.2); text-transform: uppercase;
        }
        .footer b { color: var(--giallo); margin-right: 8px; }

        model-viewer { width: 500px; height: 500px; --poster-color: transparent; }
    </style>
</head>
<body>
    <div class="viewport-bg"></div>

    <nav class="nav-rail" id="rail">
        <div style="font-family:'Space Grotesk'; font-weight:700; color:var(--giallo); margin-bottom:20px;">PIX</div>
        </nav>

    <div class="instruments">
        <div class="gauge">
            <span class="gauge-label">LOCAL_TIME</span>
            <span id="clock" class="gauge-val">00:00:00</span>
        </div>
        <div class="gauge">
            <span class="gauge-label">ATMOS_TEMP</span>
            <span id="temp" class="gauge-val">--°F</span>
        </div>
    </div>

    <main>
        <div class="binnacle-wrap">
            <div class="info-panel">
                <div class="version-badge">
                    <span class="material-symbols-rounded" style="font-size:14px">memory</span>
                    <span id="v-badge-text">VERSION // 0.2</span>
                </div>
                <h1 id="v-title">TECHNICAL<br>ALPHA</h1>
                <p class="desc" id="v-desc">Mechanical precision meets fluid design. Your high-performance skin hub.</p>
                
                <div class="btn-row">
                    <button class="m3-action primary" onclick="forceDownload('skin')">
                        <span class="material-symbols-rounded">download_2</span>
                        <b>GET SKIN</b>
                        <div class="progress-bar" id="p-skin"></div>
                    </button>
                    <button class="m3-action" onclick="forceDownload('model')">
                        <span class="material-symbols-rounded">deployed_code</span>
                        <b>GET MODEL</b>
                        <div class="progress-bar" id="p-model"></div>
                    </button>
                </div>
            </div>

            <model-viewer id="mv" auto-rotate camera-controls shadow-intensity="2" environment-image="neutral" camera-orbit="0deg 75deg 105%" loading="eager" interaction-prompt="none"></model-viewer>
        </div>
    </main>

    <div class="footer">
        <b>PIX_LABS</b> <span id="f-version">V0.2.0</span> // <span id="f-name">LUCE CORE</span>
    </div>

    <button id="settings-fab" onclick="toggleSheet()">
        <span class="material-symbols-rounded" style="font-size:32px">tune</span>
    </button>

    <div class="sheet" id="sheet" onclick="if(event.target == this) toggleSheet()">
        <div class="sheet-card">
            <h2 style="font-family:'Space Grotesk'; font-size:2rem; margin-bottom:32px;">CALIBRATION</h2>
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <span>24h TELEMETRY</span>
                <input type="checkbox" style="width:40px; height:20px; accent-color:var(--giallo);" onchange="state.is24h = this.checked">
            </div>

            <div style="background:rgba(255,255,255,0.03); padding:24px; border-radius:24px; margin-bottom:32px;">
                <p style="font-size:0.7rem; font-weight:900; opacity:0.3; margin-bottom:12px;">SYSTEM STATUS</p>
                <p style="font-size:0.9rem; opacity:0.8; line-height:1.4;">LUCE Mode active. Physics engine synchronized with Version Pushing.</p>
            </div>

            <button class="m3-action" style="width:100%" onclick="toggleSheet()">CLOSE SYSTEM</button>
        </div>
    </div>

    <script>
        const VERSIONS = [
            { id: "0.1", name: "ALPHA 0.1", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/skin%20alpha.png" },
            { id: "0.2", name: "ALPHA 0.2", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.png" }
        ];

        let state = { is24h: false };
        let currentIdx = VERSIONS.length - 1;

        function toggleSheet() { document.getElementById('sheet').classList.toggle('open'); }

        function switchVersion(idx) {
            currentIdx = idx;
            const v = VERSIONS[idx];
            
            // Visual Updates
            document.getElementById('v-badge-text').innerText = `VERSION // ${v.id}`;
            document.getElementById('mv').setAttribute('src', v.model);
            document.getElementById('f-version').innerText = `V${v.id}.0`;
            document.getElementById('f-name').innerText = v.name;
            
            // Rail Animation
            document.querySelectorAll('.nav-item').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        async function forceDownload(type) {
            const bar = document.getElementById(type === 'skin' ? 'p-skin' : 'p-model');
            const url = type === 'skin' ? VERSIONS[currentIdx].skin : VERSIONS[currentIdx].model;
            
            bar.style.width = "100%";
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = url.split('/').pop();
                link.click();
            } catch (e) { console.error("XFER_ERR"); }
            setTimeout(() => bar.style.width = "0%", 1000);
        }

        window.onload = () => {
            const rail = document.getElementById('rail');
            VERSIONS.forEach((v, i) => {
                const b = document.createElement('button');
                b.className = 'nav-item';
                b.innerHTML = `<div class="indicator"></div><b style="position:relative">${i+1}</b><span>V${v.id}</span>`;
                b.onclick = () => switchVersion(i);
                rail.appendChild(b);
            });

            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: !state.is24h 
                });
            }, 1000);

            fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5&longitude=-121.9&current_weather=true&temperature_unit=fahrenheit`)
                .then(r => r.json()).then(data => { document.getElementById('temp').innerText = `${Math.round(data.current_weather.temperature)}°F`; });

            switchVersion(currentIdx);
        };
    </script>
</body>
</html>
