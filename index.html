<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIX_LABS // HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Outfit:wght@300;500;900&family=Bebas+Neue&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --p: #6750A4; 
            --p-con: rgba(103, 80, 164, 0.15);
            --on-s-container: #1D192B; 
            --bg-1: #EADDFF; 
            --bg-2: #D0BCFF; 
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --blur: 60px;
        }

        /* OLED / NIGHT MODE */
        body.oled { background-color: #000 !important; color: #FFFFFF !important; }
        body.oled .aura-bg { opacity: 0.25; filter: blur(100px) saturate(0.5); }
        body.oled .viewer-box { background: #0a0a0a !important; border: 1px solid rgba(255,255,255,0.05); }
        body.oled .side-sheet { background: #080808; border-left: 1px solid #1a1a1a; color: #fff; }
        body.oled .m3-btn { background: var(--p) !important; color: white !important; }
        body.oled .m3-btn-secondary { background: rgba(255,255,255,0.05) !important; color: #FFFFFF !important; }
        body.oled .news-card { background: rgba(255,255,255,0.03) !important; }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; user-select: none; cursor: default; }
        body { background-color: #fdf8fd; color: var(--on-s-container); font-family: 'Outfit', sans-serif; height: 100vh; width: 100vw; display: flex; overflow: hidden; transition: background 0.8s ease; }
        
        .aura-bg { position: fixed; inset: 0; background: radial-gradient(circle at 60% 80%, var(--bg-1) 0%, transparent 50%), radial-gradient(circle at 20% 20%, var(--bg-2) 0%, transparent 50%); z-index: -1; filter: blur(var(--blur)); pointer-events: none; transition: 1s ease; }
        
        /* 1. NAV RAIL */
        nav.nav-rail { width: 90px; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 12px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border-right: 1px solid rgba(0,0,0,0.05); z-index: 50; flex-shrink: 0; }
        .v-pill { width: 48px; height: 48px; border-radius: 20px; background: rgba(0,0,0,0.05); border: none; cursor: pointer; display: grid; place-items: center; font-weight: 900; color: inherit; transition: 0.5s var(--spring); }
        .v-pill:hover { transform: scale(1.1); background: var(--p-con); }
        .v-pill.active { height: 72px; width: 34px; border-radius: 17px; background: var(--p); color: white; box-shadow: 0 10px 20px var(--p-con); }

        /* 2. MAIN LAYOUT */
        main { flex: 1; display: grid; grid-template-columns: 1.2fr 1fr; padding: 40px; gap: 60px; align-items: center; height: 100%; }
        .viewer-box { height: 85%; width: 100%; background: white; border-radius: 56px; position: relative; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.05); transition: 0.5s; }
        model-viewer { width: 100%; height: 100%; }
        
        .content { display: flex; flex-direction: column; justify-content: center; }
        h1 { font-family: 'Bebas Neue'; font-size: 8rem; line-height: 0.8; letter-spacing: -3px; margin: 15px 0; }

        /* 3. BUTTONS */
        .btn-group { display: flex; gap: 12px; width: 100%; margin-top: 32px; }
        .m3-btn { flex: 1; height: 72px; border-radius: 24px; background: var(--p); color: white; border: none; font-weight: 800; cursor: pointer; transition: 0.4s var(--spring); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .m3-btn:hover { transform: translateY(-4px); box-shadow: 0 15px 30px var(--p-con); }
        .m3-btn-secondary { background: var(--p-con); color: var(--p); }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 100%; background: rgba(255,255,255,0.2); width: 0%; transition: width 0.3s ease; }
        .btn-content { display: flex; align-items: center; gap: 8px; z-index: 2; pointer-events: none; }

        /* 4. UTILS & STATUS */
        .status-bar { position: fixed; top: 40px; right: 40px; display: flex; align-items: center; gap: 24px; z-index: 100; }
        .weather-chip { background: rgba(255,255,255,0.4); backdrop-filter: blur(20px); padding: 0 20px; border-radius: 100px; display: flex; align-items: center; gap: 8px; height: 48px; border: 1px solid rgba(255,255,255,0.2); font-weight: 700; cursor: pointer; }
        #clock { font-weight: 900; opacity: 0.6; font-family: 'Space Grotesk'; font-size: 1.2rem; min-width: 110px; text-align: right; }

        /* 5. SETTINGS SHEET */
        #settings-fab { position: fixed; bottom: 30px; right: 30px; width: 72px; height: 72px; border-radius: 24px; background: var(--p); color: white; border: none; cursor: pointer; z-index: 500; display: grid; place-items: center; box-shadow: 0 15px 30px var(--p-con); transition: 0.5s var(--spring); }
        #settings-fab:hover { transform: scale(1.1) rotate(90deg); }
        
        .side-sheet { position: fixed; top: 0; right: -420px; width: 380px; height: 100%; background: white; z-index: 600; transition: 0.6s var(--spring); padding: 40px; display: flex; flex-direction: column; gap: 24px; box-shadow: -20px 0 60px rgba(0,0,0,0.1); }
        .side-sheet.open { right: 0; }
        .news-card { background: var(--p-con); padding: 20px; border-radius: 28px; font-size: 0.85rem; line-height: 1.6; }
        
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 10px 0; }
        .color-circle { width: 100%; aspect-ratio: 1; border-radius: 16px; cursor: pointer; border: 2px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .color-circle:hover { transform: scale(1.1); border-color: var(--p); }

        .setting-row { display: flex; justify-content: space-between; align-items: center; font-weight: 600; opacity: 0.8; }
        input[type="checkbox"] { width: 40px; height: 20px; accent-color: var(--p); cursor: pointer; }
    </style>
</head>
<body>
    <div class="aura-bg"></div>

    <div class="status-bar">
        <div class="weather-chip" onclick="window.open('https://google.com/search?q=weather')">
            <span id="temp">--°F</span>
            <span class="material-symbols-rounded">cloudy_snowing</span>
        </div>
        <div id="clock">00:00:00</div>
    </div>
    
    <nav class="nav-rail" id="rail">
        <div style="font-family:'Michroma'; font-size:0.9rem; margin-bottom:30px; font-weight:bold; color:var(--p)">PIX</div>
    </nav>

    <main>
        <div class="viewer-box">
            <model-viewer id="mv" auto-rotate camera-controls shadow-intensity="1.5" environment-image="neutral" camera-orbit="45deg 55deg 140%" field-of-view="30deg" interaction-prompt="none"></model-viewer>
        </div>
        <div class="content">
            <p id="v-tag" style="font-weight:900; opacity:0.3; letter-spacing:8px; font-size:0.8rem;">VERSION // 0.2</p>
            <h1 id="v-title">ALPHA</h1>
            <p id="v-desc" style="font-size:1.2rem; opacity:0.6; line-height:1.5;">Expressive color systems & stable skin deployment.</p>
            
            <div class="btn-group">
                <button id="btn-skin" class="m3-btn" onclick="forceDownload('skin')">
                    <div class="progress-bar"></div>
                    <div class="btn-content"><span class="material-symbols-rounded">download</span> <span>GET SKIN</span></div>
                </button>
                <button id="btn-model" class="m3-btn m3-btn-secondary" onclick="forceDownload('model')">
                    <div class="progress-bar"></div>
                    <div class="btn-content"><span class="material-symbols-rounded">deployed_code</span> <span>GET MODEL</span></div>
                </button>
            </div>
        </div>
    </main>

    <button id="settings-fab" onclick="toggleSettings()">
        <span class="material-symbols-rounded" style="font-size:32px;">tune</span>
    </button>

    <div class="side-sheet" id="side-sheet">
        <h2 style="font-family:'Space Grotesk'; letter-spacing:-1px; font-size:2rem;">CALIBRATION</h2>
        <div class="news-card">
            <strong>System v1.4.0</strong><br>
            • Expressive Tonal Engine<br>
            • Tactile Interaction Layer<br>
            • Real-time Atmospheric Glow
        </div>

        <h3 style="font-size:0.75rem; opacity:0.5; text-transform:uppercase; letter-spacing:2px;">Themes</h3>
        <div class="color-grid" id="preset-grid"></div>

        <div style="background: rgba(0,0,0,0.03); padding: 20px; border-radius: 24px;">
            <div class="setting-row" style="margin-bottom:15px;">
                <span>Custom Hex</span>
                <input type="color" id="picker-swatch" oninput="applyHex(this.value)" style="border:none; background:none; cursor:pointer;">
            </div>
            <button onclick="randomTheme()" style="width:100%; height:44px; border-radius:12px; border:1px solid var(--p); background:none; color:var(--p); font-weight:900; cursor:pointer;">RANDOMIZE PALETTE</button>
        </div>

        <hr style="opacity:0.1;">
        <div class="setting-row"><span>OLED MODE</span><input type="checkbox" id="oled-toggle" onchange="updateOLED(this.checked)"></div>
        <div class="setting-row"><span>AUTO NIGHT</span><input type="checkbox" id="auto-toggle" onchange="updateAuto(this.checked)"></div>
        <div class="setting-row"><span>24H CLOCK</span><input type="checkbox" id="format-toggle" onchange="updateFormat(this.checked)"></div>
        
        <button onclick="toggleSettings()" style="margin-top:auto; height:64px; border-radius:20px; border:none; background:var(--on-s-container); color:white; cursor:pointer; font-weight:900;">SAVE & CLOSE</button>
    </div>

    <script>
        const PRESETS = [ 
            "#6750A4", "#006D3B", "#A67100", "#880E4F", "#44474E", "#8B4100", "#D0BCFF", "#004F58"
        ];
        const VERSIONS = [
            { id: "0.1", name: "ALPHA 0.1", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/skin%20alpha.png" },
            { id: "0.2", name: "ALPHA 0.2", model: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.gltf", skin: "https://raw.githubusercontent.com/james25kindle-netizen/skin-updates/refs/heads/main/alpha%200.0.2.png" }
        ];

        let state = JSON.parse(localStorage.getItem('pix_pref')) || { oled: false, auto: true, is24h: false, accent: "#6750A4" };
        let currentIdx = 1;

        function toggleSettings() { document.getElementById('side-sheet').classList.toggle('open'); }

        function applyHex(hex) {
            state.accent = hex;
            document.documentElement.style.setProperty('--p', hex);
            document.documentElement.style.setProperty('--p-con', hex + '26');
            document.documentElement.style.setProperty('--bg-1', hex + '44');
            document.documentElement.style.setProperty('--bg-2', hex + '11');
            localStorage.setItem('pix_pref', JSON.stringify(state));
        }

        function randomTheme() {
            const r = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            applyHex(r());
        }

        async function forceDownload(type) {
            const btn = document.getElementById(type === 'skin' ? 'btn-skin' : 'btn-model');
            const bar = btn.querySelector('.progress-bar');
            const url = type === 'skin' ? VERSIONS[currentIdx].skin : VERSIONS[currentIdx].model;
            bar.style.width = "100%";
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const a = document.createElement('a'); 
                a.href = window.URL.createObjectURL(blob);
                a.download = url.split('/').pop(); 
                a.click();
            } catch (e) { console.error("XFER_FAIL"); }
            setTimeout(() => bar.style.width = "0%", 2000);
        }

        function updateOLED(v) { state.oled = v; checkMode(); }
        function updateAuto(v) { state.auto = v; checkMode(); }
        function updateFormat(v) { state.is24h = v; }
        
        function checkMode() { 
            const h = new Date().getHours();
            const isNight = state.auto ? (h >= 19 || h < 7) : state.oled;
            document.body.classList.toggle('oled', isNight);
            localStorage.setItem('pix_pref', JSON.stringify(state));
        }

        function switchVersion(idx) {
            currentIdx = idx;
            document.getElementById('v-tag').innerText = `VERSION // ${VERSIONS[idx].id}`;
            document.getElementById('v-title').innerText = VERSIONS[idx].name.split(' ')[0];
            document.getElementById('mv').setAttribute('src', VERSIONS[idx].model);
            document.querySelectorAll('.v-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        window.onload = () => {
            const grid = document.getElementById('preset-grid');
            PRESETS.forEach(hex => {
                const d = document.createElement('div'); d.className = 'color-circle';
                d.style.backgroundColor = hex; d.onclick = () => applyHex(hex);
                grid.appendChild(d);
            });
            const rail = document.getElementById('rail');
            VERSIONS.forEach((_, i) => {
                const b = document.createElement('button'); b.className = 'v-pill';
                b.innerHTML = i+1; b.onclick = () => switchVersion(i);
                rail.appendChild(b);
            });
            
            applyHex(state.accent);
            document.getElementById('oled-toggle').checked = state.oled;
            document.getElementById('auto-toggle').checked = state.auto;
            document.getElementById('format-toggle').checked = state.is24h;
            checkMode(); switchVersion(currentIdx);
            
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: !state.is24h });
            }, 1000);

            fetch(`https://api.open-meteo.com/v1/forecast?latitude=37.5&longitude=-121.9&current_weather=true&temperature_unit=fahrenheit`)
                .then(r => r.json()).then(d => { document.getElementById('temp').innerText = `${Math.round(d.current_weather.temperature)}°F`; });
        };
    </script>
</body>
</html>
